server.port=${PORT:5000}
spring.application.name=urlShortener

# Resilient Database Config: Priority: DATABASE_URL -> MYSQL_URL -> Local H2
# Fully compatible with Railway (MYSQL_URL) and Render (DATABASE_URL)
spring.datasource.url=${DATABASE_URL:${MYSQL_URL:jdbc:h2:mem:urlshortener;MODE=MySQL;DB_CLOSE_DELAY=-1}}
spring.datasource.username=${MYSQLUSER:admin}
spring.datasource.password=${MYSQLPASSWORD:}

# Enable Spring Boot to correctly detect DB type for automatic schema management
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Serve static frontend from /index.html root if it exists in static/
# The Dockerfile handles copying the built Vite files.
