server.port=${PORT:5000}
spring.application.name=urlShortener

# Resilient Database Config: Prioritize Railway MySQL, fallback to H2
spring.datasource.url=${MYSQL_URL:jdbc:h2:mem:urlshortener;MODE=MySQL;DB_CLOSE_DELAY=-1}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=${MYSQL_URL:com.mysql.cj.jdbc.Driver}
spring.datasource.driver-class-name:org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${MYSQL_URL:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.dialect:org.hibernate.dialect.H2Dialect

# Application Config
app.baseUrl=${APP_BASE_URL:https://vamanasutra-production.up.railway.app}
