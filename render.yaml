services:
  - type: web
    name: vamanasutra
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: vamanasutra-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: vamanasutra-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: vamanasutra-db
          property: password

databases:
  - name: vamanasutra-db
    databaseName: urlshortener
    user: admin
    plan: free
